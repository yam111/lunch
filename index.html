<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>即時點餐系統 (Firebase 版)</title>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <!-- Gemini SDK -->
    <script type="importmap">
    {
      "imports": {
        "@google/generative-ai": "https://esm.run/@google/generative-ai"
      }
    }
    </script>

    <style>
        :root {
            --primary: #ff6b6b; --secondary: #4ecdc4;
            --bg: #F0F2F5; --surface: #FFFFFF;
            --text-main: #1e293b; --border: #E2E8F0;
        }
        * { box-sizing: border-box; }
        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); margin: 0; padding: 15px; color: var(--text-main); }
        .container { max-width: 1200px; margin: auto; }

        /* UI 佈局 */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        #boss-panel { display: none; background: #1e293b; color: white; padding: 25px; border-radius: 20px; margin-bottom: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .boss-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 20px; }
        @media (max-width: 900px) { .boss-grid { grid-template-columns: 1fr; } }

        .upload-zone { border: 2px dashed #475569; border-radius: 15px; padding: 30px; text-align: center; background: rgba(255,255,255,0.03); cursor: pointer; position: relative; }
        .upload-zone input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        
        textarea { width: 100%; height: 220px; border-radius: 12px; border: none; padding: 15px; font-family: monospace; font-size: 1rem; background: #f1f5f9; color: #1e293b; }

        .layout { display: flex; gap: 20px; align-items: flex-start; }
        .menu-side { flex: 2; }
        .cart-side { flex: 1; background: white; border-radius: 20px; padding: 25px; position: sticky; top: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        @media (max-width: 900px) { .layout { flex-direction: column; } .cart-side { width: 100%; position: static; } }

        /* 彈窗 */
        #key-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; color: #333; }

        /* 樣式 */
        .category-title { border-left: 6px solid var(--primary); padding-left: 15px; margin: 30px 0 15px; font-size: 1.5rem; font-weight: 900; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .food-card { background: white; border-radius: 18px; text-align: center; padding: 15px; border: 1px solid var(--border); transition: 0.3s; }
        .food-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .food-img { font-size: 3rem; margin-bottom: 10px; }
        .food-price { color: var(--primary); font-weight: 900; font-size: 1.2rem; margin: 5px 0; }
        .btn-add { background: var(--secondary); color: white; border: none; width: 100%; padding: 10px; border-radius: 10px; cursor: pointer; font-weight: bold; }

        /* 訂單表格 */
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; margin-top: 10px; }
        th, td { padding: 12px; border-bottom: 1px solid #f1f5f9; text-align: left; }
        .status-pill { padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        .unpaid { background: #fee2e2; color: #ef4444; }
        .paid { background: #dcfce7; color: #22c55e; }

        .summary-card { background: #334155; color: white; padding: 15px; border-radius: 12px; margin-top: 15px; }
    </style>
</head>
<body>

<div id="key-modal">
    <div class="modal-content">
        <h3>🔑 設定 Gemini API Key</h3>
        <input type="password" id="input-api-key" placeholder="貼上您的 API Key" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 15px;">
        <button onclick="saveApiKey()" style="width: 100%; padding: 12px; background: var(--secondary); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer;">開始使用</button>
    </div>
</div>

<div class="container">
    <header>
        <h1 style="font-weight: 900; color: #334155;">🍴點餐系統</h1>
        <div>
            <button onclick="resetApiKey()" style="background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 0.8rem;">重設 Key</button>
            <div id="role-badge" style="display: inline-block; background: #334155; color: white; padding: 6px 16px; border-radius: 30px; font-size: 0.9rem; margin-left: 10px;">顧客模式</div>
        </div>
    </header>

    <!-- 團主後台 -->
    <div id="boss-panel">
        <h2 style="margin-top: 0;">👨‍🍳 團主後台 (Firebase 即時連線)</h2>
        <div class="boss-grid">
            <div class="upload-zone">
                <p style="font-size: 1.2rem; font-weight: 700;">📸 上傳菜單照片</p>
                <input type="file" id="menu-file" accept="image/*" onchange="runAutoOCR(this)">
                <div id="ai-status" style="display:none; color:var(--secondary);">AI 分析中...</div>
            </div>
            <div>
                <textarea id="menu-editor" placeholder="[分類]\n品項 價格"></textarea>
                <div style="margin-top: 10px; display: flex; gap: 10px;">
                    <button onclick="publishMenu()" style="flex: 2; padding: 12px; background: var(--secondary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold;">發布菜單 (所有裝置即時同步)</button>
                    <button onclick="exportExcel()" style="padding: 12px; background: #475569; color: white; border: none; border-radius: 10px;">匯出</button>
                    <button onclick="clearOrders()" style="padding: 12px; background: var(--primary); color: white; border: none; border-radius: 10px;">清空全部</button>
                </div>
            </div>
        </div>
        <div class="summary-card" id="boss-summary">📊 結算統計：尚未有訂單</div>
    </div>

    <div class="layout">
        <div class="menu-side">
            <div id="menu-container" style="background: white; padding: 20px; border-radius: 20px; min-height: 200px;">
                <p style="text-align: center; color: #cbd5e1; padding: 80px 0;">🍽️ 尚未發布菜單，請通知團主。</p>
            </div>
            
            <div style="margin-top: 30px;">
                <h2 style="margin: 0 0 15px 0;">📝 即時訂單列表</h2>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr><th>姓名</th><th>餐點</th><th>金額</th><th>狀態</th><th class="boss-ctrl" style="display:none">管理</th></tr>
                        </thead>
                        <tbody id="order-list"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="cart-side">
            <h2 style="margin-top: 0; color: var(--primary);">🛒 我的購物車</h2>
            <input type="text" id="user-name" placeholder="👤 您的姓名" style="width:100%; padding:15px; border:2px solid #e2e8f0; border-radius:12px; margin-bottom: 15px;">
            <div id="cart-items"></div>
            <button onclick="addManualRow()" style="width: 100%; background: none; border: 1px dashed #ccc; padding: 10px; border-radius: 8px; color: #666; cursor: pointer; margin-top: 10px;">+ 手動新增項</button>
            <div style="margin-top: 30px; border-top: 3px dashed #f1f5f9; padding-top: 20px;">
                <div style="display: flex; justify-content: space-between; font-size: 1.6rem; font-weight: 900;">
                    <span>總計：</span><span id="cart-total" style="color: var(--primary);">$0</span>
                </div>
                <button onclick="submitOrder()" style="width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 15px; margin-top: 20px; font-size: 1.2rem; font-weight: bold; cursor: pointer;">確認送出點餐 🚀</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    // --- 0. 優先定義全域變數 (確保所有函數都讀得到) ---
    const urlParams = new URLSearchParams(window.location.search);
    const isBoss = urlParams.get('role') === 'boss'; // 確保這行在最前面

    // --- 1. Firebase 初始化 ---
    const firebaseConfig = {
        apiKey: "AIzaSyDRhEl_ovhh1FnNLcb335MsTybWQNyTmmM",
        authDomain: "lunch-f0895.firebaseapp.com",
        databaseURL: "https://lunch-f0895-default-rtdb.firebaseio.com",
        projectId: "lunch-f0895",
        storageBucket: "lunch-f0895.firebasestorage.app",
        messagingSenderId: "942714581747",
        appId: "1:942714581747:web:c9b888b08a740842fb7d86"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ... 中間的其他代碼 (如 renderMenu, addToCart 等) ...

    // --- 修正後的 renderOrders 函數 ---
    function renderOrders(ordersObj) {
        const list = document.getElementById('order-list');
        list.innerHTML = '';
        if (!ordersObj) { 
            if (isBoss) document.getElementById('boss-summary').innerText = '📊 結算統計：尚未有訂單'; 
            return; 
        }

        let totalAmount = 0;
        let count = 0;

        Object.keys(ordersObj).reverse().forEach(key => {
            const o = ordersObj[key];
            totalAmount += o.total;
            count++;
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><b>${o.name}</b></td>
                <td style="font-size:0.8rem; color:#666">${o.items}</td>
                <td style="font-weight:bold; color:var(--primary)">$${o.total}</td>
                <td><span class="status-pill ${o.status}">${o.status==='paid'?'✅ 已付':'⏳ 未付'}</span></td>
                <td class="boss-ctrl" style="${isBoss ? '' : 'display:none'}">
                    <button onclick="togglePaid('${key}', '${o.status}')">切換</button>
                    <button onclick="deleteOrder('${key}')" style="color:red">刪除</button>
                </td>
            `;
            list.appendChild(tr);
        });

        if (isBoss) {
            document.getElementById('boss-summary').innerHTML = `📊 目前總計 <b>${count}</b> 筆訂單，總金額：<b style="color:var(--primary); font-size:1.3rem;">$${totalAmount}</b>`;
        }
    }

    // --- 程式碼最後的初始化部分 ---
    // 檢查團主模式
    if (isBoss) {
        const panel = document.getElementById('boss-panel');
        if (panel) panel.style.display = 'block';
        
        const badge = document.getElementById('role-badge');
        if (badge) badge.innerText = '團主管理模式';
        
        // 顯示表格管理欄位
        document.querySelectorAll('.boss-ctrl').forEach(e => e.style.display = 'table-cell');
    }

    // 監聽 Firebase
    db.ref('system/menu').on('value', (snap) => renderMenu(snap.val()));
    db.ref('orders').on('value', (snap) => renderOrders(snap.val()));

</script>

</body>
</html>
