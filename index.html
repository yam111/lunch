<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>點餐系統 - 現代化版</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root {
            --primary: #ff6b6b; --primary-hover: #ff5252;
            --secondary: #4ecdc4; 
            --success: #34C759; --danger: #FF3B30;
            --bg: #F5F5F7; --surface: #FFFFFF;
            --text-main: #1D1D1F; --text-muted: #86868B;
            --border: #E5E5EA;
            --primary-soft: rgba(255, 107, 107, 0.1);
        }

        body { 
            font-family: 'Noto Sans TC', -apple-system, sans-serif; 
            margin: 0; padding: 20px; 
            background-color: var(--bg); color: var(--text-main); 
            background-image: url('https://images.unsplash.com/photo-1495195134817-aeb325a55b65?q=80&w=2500&auto=format&fit=crop');
            background-size: cover; background-position: center; background-attachment: fixed;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(248, 250, 252, 0.85); z-index: -1;
        }

        .layout-wrapper { max-width: 1200px; margin: auto; }

        /* 左右佈局 */
        .ordering-layout { display: flex; gap: 20px; align-items: flex-start; }
        
        .menu-side { flex: 2; }
        .cart-side { 
            flex: 1; min-width: 320px; background: white; border-radius: 15px; 
            padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            position: sticky; top: 20px; 
        }

        @media (max-width: 900px) {
            .ordering-layout { flex-direction: column; }
            .cart-side { width: 100%; position: static; box-sizing: border-box; }
        }

        /* 菜單卡片 */
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .category-title { border-left: 5px solid var(--primary); padding-left: 10px; margin: 20px 0 15px; }

        .food-card { 
            background: white; border-radius: 12px; overflow: hidden; 
            transition: 0.3s; border: 1px solid var(--border);
            display: flex; flex-direction: column;
        }
        .food-card:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .food-img { height: 100px; background: #f8fafc; display: flex; align-items: center; justify-content: center; font-size: 3rem; }
        .food-info { padding: 12px; flex: 1; }
        .food-name { font-weight: bold; font-size: 1rem; margin-bottom: 5px; }
        .food-price { color: var(--primary); font-weight: 800; margin-bottom: 10px; }
        .add-btn { 
            width: 100%; padding: 8px; border: none; border-radius: 6px; 
            background: var(--secondary); color: white; cursor: pointer; font-weight: bold; 
        }

        /* 購物車項目 */
        .cart-item-row { 
            display: flex; gap: 5px; align-items: center; margin-bottom: 8px; 
            background: #f8fafc; padding: 8px; border-radius: 8px; 
        }
        .cart-item-row input { 
            padding: 8px; border: 1px solid #ddd; border-radius: 5px; outline: none; 
        }
        .item-input { flex: 1; }
        .price-input { width: 60px; text-align: center; font-weight: bold; color: var(--primary); }

        .total-area { margin-top: 20px; padding-top: 15px; border-top: 2px dashed #eee; }
        .checkout-btn { 
            width: 100%; padding: 15px; background: var(--primary); color: white; 
            border: none; border-radius: 10px; font-size: 1.1rem; font-weight: bold; 
            cursor: pointer; margin-top: 10px; 
        }

        input[type="text"]#name {
            width: 100%; padding: 12px; box-sizing: border-box; margin-bottom: 15px;
            border: 2px solid var(--border); border-radius: 8px; font-size: 1rem;
        }
    </style>
</head>
<body>

<div class="layout-wrapper">
    <div class="ordering-layout">
        <!-- 左側：菜單展示區 -->
        <div class="menu-side">
            <h2 style="margin-top: 0;">📋 本日菜單</h2>
            <div id="system-menu-container">
                <!-- 由 JS 動態生成 -->
                <div style="text-align:center; padding: 60px 20px; background: white; border-radius: 15px; color: var(--text-muted); border: 2px dashed #eee;">
                    🍽️ 載入菜單中，請稍候...
                </div>
            </div>
        </div>

        <!-- 右側：購物車表單 -->
        <div class="cart-side">
            <h2 style="margin: 0 0 15px 0; font-size: 1.4em;">🛒 您的購物車</h2>
            <form id="order-form">
                <input type="text" id="name" placeholder="👤 請輸入您的姓名" required>
                
                <div id="order-items-container">
                    <!-- 預設第一行 -->
                </div>
                
                <button type="button" onclick="addOrderItemRow()" style="width: 100%; background: #f1f5f9; border: none; border-radius: 8px; padding: 10px; margin-top: 10px; cursor: pointer;">➕ 手動新增品項</button>

                <div class="total-area">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-weight: bold;">總計金額：</span>
                        <span id="cart-total-preview" style="font-weight: 900; font-size: 1.6rem; color: var(--primary);">$0</span>
                    </div>
                    <button type="submit" class="checkout-btn">送出訂單 🚀</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // 模擬從後端獲取的菜單字串格式
    const mockMenuData = `
[主食類]
經典牛肉堡 150
肉燥飯 45
義大利肉醬麵 120
[飲品]
珍珠奶茶 65
冰美式 80
[小吃]
脆薯條 60
貢丸湯 35
    `;

    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
        renderSystemMenuTags(mockMenuData);
        addOrderItemRow(); // 初始化購物車第一行
    });

    // 計算購物車總額
    function updateCartTotal() {
        let total = 0;
        document.querySelectorAll('.price-input').forEach(input => {
            let val = parseInt(input.value);
            if(!isNaN(val)) total += val;
        });
        document.getElementById('cart-total-preview').innerText = '$' + total;
    }

    // 新增購物車列
    function addOrderItemRow(item = '', price = '') {
        const container = document.getElementById('order-items-container');
        const row = document.createElement('div');
        row.className = 'cart-item-row';
        row.innerHTML = `
            <input type="text" class="item-input" placeholder="品項" required value="${item}">
            <input type="number" class="price-input" placeholder="0" required min="0" value="${price}">
            <button type="button" onclick="this.parentElement.remove(); updateCartTotal();" style="border:none; background:none; color:var(--danger); cursor:pointer; font-size:1.2rem;">&times;</button>
        `;
        
        // 監聽輸入即時更新總價
        row.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', updateCartTotal);
        });
        
        container.appendChild(row);
        updateCartTotal();
    }

    // 生成菜單卡片
    function renderSystemMenuTags(menuStr) {
        let container = document.getElementById('system-menu-container');
        if (!menuStr) return;

        container.innerHTML = '';
        let lines = menuStr.split('\n');
        let currentGrid = null;

        lines.forEach(line => {
            let text = line.trim();
            if (!text) return;

            if (text.startsWith('[') && text.endsWith(']')) {
                let catName = text.substring(1, text.length - 1);
                let title = document.createElement('h3');
                title.className = 'category-title';
                title.innerText = catName;
                container.appendChild(title);

                currentGrid = document.createElement('div');
                currentGrid.className = 'menu-grid';
                container.appendChild(currentGrid);
            } else {
                let parts = text.split(/\s+/);
                if (parts.length >= 2) {
                    let price = parts.pop();
                    let item = parts.join(' ');

                    let emoji = "🍱";
                    if(item.includes('麵')) emoji = "🍜";
                    else if(item.includes('湯')) emoji = "🥣";
                    else if(item.includes('奶茶') || item.includes('飲') || item.includes('冰')) emoji = "🥤";
                    else if(item.includes('飯')) emoji = "🍛";
                    else if(item.includes('堡')) emoji = "🍔";

                    let card = document.createElement('div');
                    card.className = 'food-card';
                    card.innerHTML = `
                        <div class="food-img">${emoji}</div>
                        <div class="food-info">
                            <div class="food-name">${item}</div>
                            <div class="food-price">$${price}</div>
                            <button class="add-btn" type="button">加入購物車</button>
                        </div>
                    `;

                    card.querySelector('.add-btn').onclick = (e) => {
                        // 檢查最後一行是否為空，是則填入，否則新增
                        let rows = document.querySelectorAll('.cart-item-row');
                        let lastRow = rows[rows.length - 1];
                        let itemInp = lastRow ? lastRow.querySelector('.item-input') : null;

                        if (itemInp && itemInp.value === "") {
                            itemInp.value = item;
                            lastRow.querySelector('.price-input').value = price;
                        } else {
                            addOrderItemRow(item, price);
                        }
                        updateCartTotal();

                        // 按鈕動畫
                        let btn = e.target;
                        btn.style.background = 'var(--success)';
                        btn.innerText = '✅ 已加入';
                        setTimeout(() => {
                            btn.style.background = 'var(--secondary)';
                            btn.innerText = '加入購物車';
                        }, 800);
                    };
                    
                    if (currentGrid) currentGrid.appendChild(card);
                }
            }
        });
    }

    // 處理表單送出
    document.getElementById('order-form').onsubmit = function(e) {
        e.preventDefault();
        const name = document.getElementById('name').value;
        const total = document.getElementById('cart-total-preview').innerText;
        alert(`感謝 ${name} 的訂購！\n總金額：${total}\n訂單已送出（此為模擬功能）`);
    };
</script>

</body>
</html>
