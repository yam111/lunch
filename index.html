<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 智慧點餐系統 - 團購管理全功能版</title>

    <!-- 外部函式庫：Google Fonts, Firebase, XLSX, Tesseract AI -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <style>
        :root {
            --primary: #ff6b6b; --primary-hover: #ff5252;
            --secondary: #4ecdc4; --success: #34C759;
            --danger: #FF3B30; --warning: #FF9500;
            --bg: #F0F2F5; --surface: #FFFFFF;
            --text-main: #1D1D1F; --text-muted: #86868B;
            --border: #E5E5EA; --primary-soft: rgba(255, 107, 107, 0.1);
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { 
            font-family: 'Noto Sans TC', -apple-system, sans-serif; 
            margin: 0; padding: 15px; background: var(--bg); color: var(--text-main); 
        }

        .container { max-width: 1200px; margin: auto; }

        /* Header */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .badge-role { background: #333; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; }

        /* 團主面板 */
        #boss-panel { display: none; background: #2d3436; color: white; padding: 25px; border-radius: 16px; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .boss-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .boss-grid { grid-template-columns: 1fr; } }
        
        .upload-zone { border: 2px dashed #666; border-radius: 10px; padding: 20px; text-align: center; background: rgba(255,255,255,0.05); }
        textarea { width: 100%; height: 150px; border-radius: 8px; border: none; padding: 12px; font-size: 0.95rem; font-family: monospace; }
        #ocr-status { color: var(--secondary); font-weight: bold; margin-top: 10px; display: none; }

        /* 雙欄版面 */
        .layout { display: flex; gap: 20px; align-items: flex-start; }
        .menu-side { flex: 2; }
        .cart-side { flex: 1; background: white; border-radius: 16px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: sticky; top: 20px; }
        @media (max-width: 900px) { .layout { flex-direction: column; } .cart-side { width: 100%; position: static; } }

        /* 菜單卡片 */
        .category-title { border-left: 5px solid var(--primary); padding-left: 12px; margin: 25px 0 15px; font-size: 1.3rem; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .food-card { background: white; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; transition: 0.3s; cursor: default; }
        .food-card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .food-img { height: 100px; background: #f8fafc; display: flex; align-items: center; justify-content: center; font-size: 3rem; }
        .food-info { padding: 12px; text-align: center; }
        .food-name { font-weight: bold; margin-bottom: 5px; height: 2.4em; overflow: hidden; }
        .food-price { color: var(--primary); font-weight: 800; font-size: 1.1rem; margin-bottom: 10px; }
        .btn-add { width: 100%; background: var(--secondary); color: white; border: none; border-radius: 6px; padding: 8px; font-weight: bold; cursor: pointer; }

        /* 購物車 */
        .cart-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; background: #f8fafc; padding: 8px; border-radius: 8px; }
        .cart-row input { border: 1px solid #ddd; padding: 6px; border-radius: 5px; outline: none; }
        .btn-remove { background: none; border: none; color: var(--danger); font-size: 1.2rem; cursor: pointer; }

        /* 訂單表格 */
        .order-card { background: white; border-radius: 16px; padding: 20px; margin-top: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { text-align: left; padding: 15px; border-bottom: 1px solid #eee; }
        .status-pill { padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        .unpaid { background: #fff4e6; color: #d9480f; }
        .paid { background: #ebfbee; color: #2b8a3e; }

        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-p { background: var(--primary); color: white; }
        .btn-s { background: var(--secondary); color: white; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🍴 智慧點餐系統</h1>
        <div id="role-badge" class="badge-role">一般顧客模式</div>
    </header>

    <!-- 團主面板 (只有 role=boss 會顯示) -->
    <div id="boss-panel">
        <h2 style="margin-top:0">👨‍🍳 團主管理後台</h2>
        <div class="boss-grid">
            <div class="upload-zone">
                <p>📸 AI 辨識菜單照片</p>
                <input type="file" id="ocr-upload" accept="image/*" onchange="handleOCR(this)">
                <div id="ocr-status">正在啟動 AI 辨識引擎... <span id="ocr-pct">0%</span></div>
                <p style="font-size:0.8rem; color:#aaa; margin-top:10px;">支援繁體中文/英文，圖片清晰辨識度更高</p>
            </div>
            <div>
                <p>📝 編輯菜單內容 (格式: 品項 價格)</p>
                <textarea id="menu-editor" placeholder="例如：
[主食]
牛肉麵 150
滷肉飯 45

[飲料]
紅茶 30"></textarea>
                <div class="btn-group">
                    <button class="btn btn-s" onclick="publishMenu()">發布菜單</button>
                    <button class="btn" style="background:#555; color:white;" onclick="exportExcel()">匯出 Excel</button>
                    <button class="btn" style="background:var(--danger); color:white;" onclick="clearAllOrders()">清空訂單</button>
                </div>
            </div>
        </div>
    </div>

    <div class="layout">
        <!-- 左側：菜單 -->
        <div class="menu-side">
            <div id="menu-container">
                <div style="text-align:center; padding: 50px; background:white; border-radius:16px; color:#aaa;">
                    🍽️ 尚未發布菜單，請稍候或切換團主模式發布。
                </div>
            </div>

            <!-- 全體訂單表格 -->
            <div class="order-card">
                <h2 style="margin-top:0">📝 訂單追蹤清單</h2>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>姓名</th>
                                <th>內容</th>
                                <th>總額</th>
                                <th>狀態</th>
                                <th class="boss-only" style="display:none">管理</th>
                            </tr>
                        </thead>
                        <tbody id="order-list"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 右側：購物車 -->
        <div class="cart-side">
            <h2 style="margin-top:0">🛒 您的購物車</h2>
            <input type="text" id="cust-name" placeholder="👤 請輸入您的姓名" style="width:100%; padding:12px; margin-bottom:15px; border:2px solid var(--border); border-radius:8px;">
            
            <div id="cart-items"></div>
            
            <button onclick="addCartRow()" style="width:100%; background:none; border:1px dashed #ccc; padding:10px; border-radius:8px; cursor:pointer; margin-top:10px; color:#666;">+ 手動新增其他項</button>

            <div style="margin-top:20px; padding-top:15px; border-top:2px dashed #eee;">
                <div style="display:flex; justify-content:space-between; font-weight:900; font-size:1.4rem;">
                    <span>總計：</span>
                    <span id="cart-total" style="color:var(--primary)">$0</span>
                </div>
                <button class="btn btn-p" style="width:100%; margin-top:15px; font-size:1.1rem; padding:15px;" onclick="submitOrder()">送出訂單 🚀</button>
            </div>
        </div>
    </div>
</div>

<script>
    // --- 1. 初始化設定 ---
    const urlParams = new URLSearchParams(window.location.search);
    const isBoss = urlParams.get('role') === 'boss';
    
    // Firebase 配置 (請根據需要填寫，若不填寫則自動使用瀏覽器本地儲存)
    const firebaseConfig = { databaseURL: "" };
    let db = null;
    if (firebaseConfig.databaseURL) {
        firebase.initializeApp(firebaseConfig);
        db = firebase.database();
    }

    document.addEventListener('DOMContentLoaded', () => {
        if (isBoss) {
            document.getElementById('boss-panel').style.display = 'block';
            document.getElementById('role-badge').innerText = '團主管理員模式';
            document.querySelectorAll('.boss-only').forEach(el => el.style.display = 'table-cell');
        }
        loadMenu();
        loadOrders();
        addCartRow(); // 預設一行
    });

    // --- 2. AI 辨識功能 (OCR) ---
    async function handleOCR(input) {
        if (!input.files || !input.files[0]) return;
        const statusEl = document.getElementById('ocr-status');
        const pctEl = document.getElementById('ocr-pct');
        statusEl.style.display = 'block';

        try {
            const worker = await Tesseract.createWorker('zho_tra+eng');
            const { data: { text } } = await worker.recognize(input.files[0], {
                onProgress: m => { if(m.status === 'recognizing') pctEl.innerText = Math.round(m.progress * 100) + '%' }
            });

            // 智慧解析：尋找品項與數字
            const lines = text.split('\n');
            let result = "[AI 辨識結果]\n";
            lines.forEach(line => {
                const match = line.match(/(.+?)(\d+)\s*$/); // 尋找結尾是數字的行
                if (match) {
                    const name = match[1].trim().replace(/[^\u4e00-\u9fa5a-zA-Z0-9]/g, '');
                    const price = match[2];
                    if (name.length > 1) result += `${name} ${price}\n`;
                }
            });
            document.getElementById('menu-editor').value = result;
            alert("辨識完成，請微調格式後發布！");
            await worker.terminate();
        } catch (e) {
            alert("辨識出錯，請確保圖片文字清晰。");
        } finally {
            statusEl.style.display = 'none';
        }
    }

    // --- 3. 菜單管理 ---
    function publishMenu() {
        const raw = document.getElementById('menu-editor').value;
        if (db) db.ref('system/menu').set(raw);
        else localStorage.setItem('localMenu', raw);
        loadMenu();
        alert("菜單已更新！");
    }

    function loadMenu() {
        const handle = (val) => {
            if (!val) return;
            const container = document.getElementById('menu-container');
            container.innerHTML = '';
            const lines = val.split('\n');
            let currentGrid = null;

            lines.forEach(line => {
                const t = line.trim();
                if (!t) return;
                if (t.startsWith('[')) {
                    const title = document.createElement('h3');
                    title.className = 'category-title';
                    title.innerText = t.replace(/[\[\]]/g, '');
                    container.appendChild(title);
                    currentGrid = document.createElement('div');
                    currentGrid.className = 'menu-grid';
                    container.appendChild(currentGrid);
                } else {
                    const parts = t.split(/\s+/);
                    const price = parts.pop();
                    const name = parts.join(' ');
                    if (!isNaN(price) && currentGrid) {
                        const card = document.createElement('div');
                        card.className = 'food-card';
                        card.innerHTML = `
                            <div class="food-img">${guessEmoji(name)}</div>
                            <div class="food-info">
                                <div class="food-name">${name}</div>
                                <div class="food-price">$${price}</div>
                                <button class="btn-add" onclick="quickAdd('${name}', ${price})">加入購物車</button>
                            </div>
                        `;
                        currentGrid.appendChild(card);
                    }
                }
            });
        };
        if (db) db.ref('system/menu').on('value', snap => handle(snap.val()));
        else handle(localStorage.getItem('localMenu'));
    }

    // --- 4. 購物車邏輯 ---
    function addCartRow(name = '', price = '') {
        const container = document.getElementById('cart-items');
        const div = document.createElement('div');
        div.className = 'cart-row';
        div.innerHTML = `
            <input type="text" class="i-name" placeholder="品項" value="${name}" style="flex:2">
            <input type="number" class="i-price" placeholder="價格" value="${price}" style="flex:1" oninput="calcTotal()">
            <button class="btn-remove" onclick="this.parentElement.remove(); calcTotal();">&times;</button>
        `;
        container.appendChild(div);
        calcTotal();
    }

    function quickAdd(name, price) {
        const rows = document.querySelectorAll('.cart-row');
        const lastRow = rows[rows.length - 1];
        if (lastRow && lastRow.querySelector('.i-name').value === '') {
            lastRow.querySelector('.i-name').value = name;
            lastRow.querySelector('.i-price').value = price;
        } else {
            addCartRow(name, price);
        }
        calcTotal();
    }

    function calcTotal() {
        let total = 0;
        document.querySelectorAll('.i-price').forEach(i => total += (parseInt(i.value) || 0));
        document.getElementById('cart-total').innerText = '$' + total;
    }

    // --- 5. 訂單處理 ---
    function submitOrder() {
        const name = document.getElementById('cust-name').value;
        if (!name) return alert("請輸入姓名！");
        
        let items = [];
        let total = 0;
        document.querySelectorAll('.cart-row').forEach(row => {
            const iname = row.querySelector('.i-name').value;
            const iprice = parseInt(row.querySelector('.i-price').value);
            if (iname && iprice) {
                items.push(`${iname}($${iprice})`);
                total += iprice;
            }
        });

        if (items.length === 0) return alert("購物車是空的！");

        const data = { name, items: items.join(', '), total, status: 'unpaid', time: Date.now() };
        if (db) db.ref('orders').push(data);
        else {
            let local = JSON.parse(localStorage.getItem('localOrders') || '[]');
            local.push(data);
            localStorage.setItem('localOrders', JSON.stringify(local));
            loadOrders();
        }
        alert("訂單已送出！");
        document.getElementById('cart-items').innerHTML = '';
        addCartRow();
    }

    function loadOrders() {
        const render = (data) => {
            const list = document.getElementById('order-list');
            list.innerHTML = '';
            if (!data) return;
            Object.keys(data).forEach(key => {
                const o = data[key];
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-weight:bold">${o.name}</td>
                    <td style="font-size:0.85rem; color:#666">${o.items}</td>
                    <td style="color:var(--primary); font-weight:800">$${o.total}</td>
                    <td><span class="status-pill ${o.status}">${o.status === 'paid' ? '✅ 已付' : '⏳ 未付'}</span></td>
                    <td class="boss-only" style="${isBoss ? '' : 'display:none'}">
                        <button class="btn btn-s" style="padding:4px 8px; font-size:0.75rem" onclick="toggleStatus('${key}', '${o.status}')">切換狀態</button>
                        <button class="btn" style="background:var(--danger); color:white; padding:4px 8px; font-size:0.75rem" onclick="delOrder('${key}')">刪除</button>
                    </td>
                `;
                list.appendChild(tr);
            });
        };
        if (db) db.ref('orders').on('value', snap => render(snap.val()));
        else render(JSON.parse(localStorage.getItem('localOrders') || '[]'));
    }

    // --- 6. 團主控制功能 ---
    window.toggleStatus = function(id, cur) {
        const next = cur === 'paid' ? 'unpaid' : 'paid';
        if (db) db.ref(`orders/${id}/status`).set(next);
        else {
            let local = JSON.parse(localStorage.getItem('localOrders'));
            local[id].status = next;
            localStorage.setItem('localOrders', JSON.stringify(local));
            loadOrders();
        }
    };

    window.delOrder = function(id) {
        if (!confirm("確定刪除此訂單？")) return;
        if (db) db.ref(`orders/${id}`).remove();
        else {
            let local = JSON.parse(localStorage.getItem('localOrders'));
            local.splice(id, 1);
            localStorage.setItem('localOrders', JSON.stringify(local));
            loadOrders();
        }
    };

    window.clearAllOrders = function() {
        if (confirm("確定清空所有訂單資料？")) {
            if (db) db.ref('orders').remove();
            else localStorage.removeItem('localOrders');
            loadOrders();
        }
    };

    function exportExcel() {
        const table = document.querySelector("table");
        const wb = XLSX.utils.table_to_book(table);
        XLSX.writeFile(wb, `訂單明細_${new Date().toLocaleDateString()}.xlsx`);
    }

    function guessEmoji(n) {
        if (n.includes('飯')) return '🍛';
        if (n.includes('麵')) return '🍜';
        if (n.includes('堡')) return '🍔';
        if (n.includes('茶') || n.includes('飲') || n.includes('水')) return '🥤';
        if (n.includes('咖啡')) return '☕';
        if (n.includes('湯')) return '🥣';
        return '🍱';
    }
</script>

</body>
</html>
